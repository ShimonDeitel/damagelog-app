name: DamagelogJobsiteDamage
options:
  bundleIdPrefix: com.shimondeitel.damagelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  DamagelogJobsiteDamage:
    type: application
    platform: iOS
    sources:
      - path: DamagelogJobsiteDamage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.damagelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: DamagelogJobsiteDamage/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DamagelogJobsiteDamageTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DamagelogJobsiteDamageTests
      - path: DamagelogJobsiteDamage.storekit
    dependencies:
      - target: DamagelogJobsiteDamage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.damagelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DamagelogJobsiteDamageUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DamagelogJobsiteDamageUITests
    dependencies:
      - target: DamagelogJobsiteDamage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.damagelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  DamagelogJobsiteDamage:
    build:
      targets:
        DamagelogJobsiteDamage: all
        DamagelogJobsiteDamageTests: [test]
        DamagelogJobsiteDamageUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: DamagelogJobsiteDamage.storekit
    test:
      config: Debug
      storeKitConfiguration: DamagelogJobsiteDamage.storekit
      targets:
        - DamagelogJobsiteDamageTests
        - DamagelogJobsiteDamageUITests
    archive:
      config: Release
